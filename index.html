<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nakata Spin Pong - Fixed</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #1a2a3a; color: white;
            font-family: 'Helvetica Neue', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        .scoreboard {
            display: flex; gap: 20px; margin-bottom: 10px; background: #000;
            padding: 10px 30px; border-radius: 5px; border: 2px solid #555;
        }
        .score-num { font-size: 32px; font-weight: bold; color: #f1c40f; font-family: monospace; }
        .server-dot { width: 10px; height: 10px; background: #f1c40f; border-radius: 50%; display: inline-block; visibility: hidden; }
        .is-serving { visibility: visible; }
        
        #game-area { position: relative; perspective: 1000px; }
        canvas {
            background-color: #1e5799; display: block;
            border-bottom: 10px solid #fff; border-top: 10px solid #fff;
            transform: rotateX(25deg);
        }
        #message-display {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            font-size: 28px; font-weight: bold; color: #fff; text-align: center;
            text-shadow: 0 0 15px rgba(0,0,0,1); pointer-events: none; z-index: 5;
        }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0, 0, 0, 0.9); padding: 40px;
            border-radius: 10px; width: 85%; z-index: 10; border: 2px solid #f1c40f;
        }
        button {
            background: #f1c40f; border: none; color: #000; padding: 15px 30px;
            font-size: 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="scoreboard">
    <div style="text-align:center">
        <div id="cpu-serve" class="server-dot"></div>
        <div style="font-size:10px">CPU</div><div id="cpu-score" class="score-num">0</div>
    </div>
    <div style="font-size: 32px; margin-top:10px">:</div>
    <div style="text-align:center">
        <div id="player-serve" class="server-dot"></div>
        <div style="font-size:10px">YOU</div><div id="player-score" class="score-num">0</div>
    </div>
</div>

<div id="game-area">
    <canvas id="pongCanvas"></canvas>
    <div id="message-display"></div>
    <div id="overlay">
        <h2 style="margin-top:0; color:#f1c40f;">SPIN TACTICS</h2>
        <p style="font-size:14px;">左右に動いて位置を決め、タップでトス！<br>打つ瞬間にラケットを振るとスピンがかかるぞ。</p>
        <button onclick="startGame()">試合開始</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const messageDisplay = document.getElementById("message-display");

    const w = 400, h = 600;
    canvas.width = w; canvas.height = h;

    let isRunning = false, isWaiting = false, isServeMode = true;
    let smashActive = false, smashTimer = 0;
    let totalPoints = 0, server = "player";

    const ball = { 
        x: w/2, y: h/2, radius: 7, dx: 0, dy: 0, 
        z: 0, vz: 0, spin: 0, isSmash: false 
    };
    const player = { x: w/2-40, y: h-30, width: 80, height: 12, color: "#e74c3c", score: 0, vx: 0 };
    const cpu = { x: w/2-40, y: 15, width: 80, height: 12, color: "#34495e", score: 0 };

    function handleInput(e) {
        if (!isRunning) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = canvas.getBoundingClientRect();
        
        let nextX = (clientX - rect.left) * (w / rect.width) - player.width / 2;
        player.vx = nextX - player.x; 
        player.x = nextX;

        // はみ出し制限
        if (player.x < 0) player.x = 0;
        if (player.x > w - player.width) player.x = w - player.width;

        if (e.type === "touchstart" || e.type === "mousedown") {
            // 自分のサーブ権で待機中ならトスを上げる
            if (isServeMode && server === "player" && isWaiting) {
                launchServe();
            } else {
                smashActive = true; smashTimer = 15;
            }
        }
    }

    window.addEventListener("mousemove", handleInput);
    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", handleInput, { passive: false });
    window.addEventListener("touchmove", handleInput, { passive: false });

    function startGame() {
        player.score = 0; cpu.score = 0; totalPoints = 0; server = "player";
        updateScores(); overlay.style.display = "none"; isRunning = true;
        prepareNextPoint();
        animate(); 
    }

    function prepareNextPoint() {
        isWaiting = true; 
        isServeMode = true;
        ball.z = 0; ball.vz = 0; ball.dx = 0; ball.dy = 0; ball.spin = 0;
        
        server = (Math.floor(totalPoints / 2) % 2 === 0) ? "player" : "cpu";
        updateServeIndicator();
        
        messageDisplay.innerHTML = server === "player" ? "YOUR SERVE<br><small>TAP TO TOSS</small>" : "CPU SERVE";
        messageDisplay.style.display = "block";

        if (server === "cpu") {
            setTimeout(() => { if(isRunning) launchServe(); }, 1500);
        }
    }

    function launchServe() {
        messageDisplay.style.display = "none";
        isWaiting = false; // ここで物理演算を再開

        if (server === "player") {
            ball.dy = -9;
            ball.dx = player.vx * 0.5;
            ball.vz = 7; // トス
            ball.spin = player.vx * 1.5; // 振った分だけスピン
        } else {
            ball.dy = 9;
            ball.dx = (Math.random()-0.5)*5;
            ball.vz = 7;
            ball.spin = (Math.random()-0.5)*10;
        }
    }

    function update() {
        if (!isRunning) return;

        // サーブ待機中：ボールをラケットの位置に固定
        if (isWaiting && isServeMode) {
            if (server === "player") {
                ball.x = player.x + player.width / 2;
                ball.y = player.y - 10;
            } else {
                ball.x = cpu.x + cpu.width / 2;
                ball.y = cpu.y + 10;
            }
            return; 
        }

        if (smashTimer > 0) smashTimer--; else smashActive = false;

        ball.x += ball.dx;
        ball.y += ball.dy;
        ball.z += ball.vz;
        ball.vz -= 0.25; // 重力

        // バウンド
        if (ball.z < 0) {
            ball.z = 0; ball.vz = 5; 
            ball.dx += ball.spin * 0.5;
            ball.spin *= 0.8;
        }

        // アウト判定
        if (ball.x < -50 || ball.x > w + 50) pointScore(ball.x < 0 ? "cpu" : "player");

        // CPU AI
        cpu.x += (ball.x - (cpu.x + cpu.width/2)) * 0.12;

        let paddle = (ball.y > h/2) ? player : cpu;
        if (detectCollision(ball, paddle)) {
            isServeMode = false;
            let collidePoint = (ball.x - (paddle.x + paddle.width/2)) / (paddle.width/2);
            let angle = collidePoint * (Math.PI/3);
            let direction = (ball.y > h/2) ? -1 : 1;

            let speed = (paddle === player && smashActive) ? 15 : 8;
            ball.isSmash = (paddle === player && smashActive);
            
            ball.dy = direction * speed * Math.cos(angle);
            ball.dx = speed * Math.sin(angle);
            ball.vz = 6;
            
            if(paddle === player) ball.spin = player.vx * 1.5;
            else ball.spin = (Math.random()-0.5)*10;
        }

        if (ball.y < -30 || ball.y > h + 30) pointScore(ball.y < 0 ? "player" : "cpu");
    }

    function pointScore(winner) {
        if (winner === "player") player.score++; else cpu.score++;
        totalPoints++; updateScores();
        if (player.score >= 11 || cpu.score >= 11) { endGame(); return; }
        prepareNextPoint();
    }

    function animate() { 
        update(); 
        draw(); 
        if (isRunning) requestAnimationFrame(animate); 
    }

    function updateScores() {
        document.getElementById("player-score").innerText = player.score;
        document.getElementById("cpu-score").innerText = cpu.score;
    }

    function updateServeIndicator() {
        document.getElementById("player-serve").className = "server-dot" + (server === "player" ? " is-serving" : "");
        document.getElementById("cpu-serve").className = "server-dot" + (server === "cpu" ? " is-serving" : "");
    }

    function endGame() { isRunning = false; overlay.style.display = "block"; }

    function detectCollision(b, p) {
        return b.x > p.x && b.x < p.x + p.width && b.y > p.y - 15 && b.y < p.y + p.height + 15 && b.z < 30;
    }

    function draw() {
        ctx.fillStyle = "#1e5799"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, w, 2); ctx.fillRect(0, h-2, w, 2); ctx.fillRect(w/2 - 1, 0, 2, h);
        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fillRect(0, h/2 - 1, w, 2);

        // 影
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.arc(ball.x + ball.z*0.3, ball.y + ball.z*0.3, ball.radius, 0, Math.PI*2); ctx.fill();

        // ボール
        let currentRadius = ball.radius + (ball.z * 0.15);
        ctx.fillStyle = ball.isSmash ? "#f1c40f" : "#ffffff";
        ctx.beginPath(); ctx.arc(ball.x, ball.y - ball.z, currentRadius, 0, Math.PI*2); ctx.fill();

        drawPaddle(player.x, player.y, player.width, player.height, player.color, true);
        drawPaddle(cpu.x, cpu.y, cpu.width, cpu.height, cpu.color, false);
    }

    function drawPaddle(x, y, width, height, color, isPlayer) {
        ctx.fillStyle = color;
        if (isPlayer && smashActive) { ctx.shadowBlur = 15; ctx.shadowColor = "#fff"; }
        ctx.beginPath(); ctx.roundRect(x, y, width, height, 5); ctx.fill();
        ctx.shadowBlur = 0;
    }

    draw();
</script>
</body>
</html>
