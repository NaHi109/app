<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nakata Real Table Tennis</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #2c3e50; color: white;
            font-family: 'Helvetica Neue', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        .scoreboard {
            display: flex; gap: 20px; margin-bottom: 10px; background: #1a1a1a;
            padding: 10px 30px; border-radius: 5px; border: 2px solid #bdc3c7;
        }
        .score-num { font-size: 32px; font-weight: bold; color: #f1c40f; font-family: monospace; }
        #game-area { position: relative; perspective: 800px; }
        canvas {
            background-color: #1e5799; display: block; border: 8px solid #fff;
            border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: rotateX(20deg);
        }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0, 0, 0, 0.85); padding: 40px;
            border-radius: 10px; width: 80%; z-index: 10;
        }
        #message-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; font-weight: bold; color: #f1c40f;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); pointer-events: none;
            display: none; z-index: 5;
        }
        button {
            background: #e74c3c; border: none; color: white; padding: 15px 30px;
            font-size: 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="scoreboard">
    <div style="text-align:center"><div style="font-size:12px">CPU</div><div id="cpu-score" class="score-num">0</div></div>
    <div style="font-size: 32px; margin-top:10px">-</div>
    <div style="text-align:center"><div style="font-size:12px">YOU</div><div id="player-score" class="score-num">0</div></div>
</div>

<div id="game-area">
    <canvas id="pongCanvas"></canvas>
    <div id="message-display">READY?</div>
    <div id="overlay">
        <h2 style="margin-top:0;">REAL PING PONG</h2>
        <button onclick="startGame()">試合開始</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const messageDisplay = document.getElementById("message-display");

    const w = 400, h = 600;
    canvas.width = w; canvas.height = h;

    let isRunning = false, isWaiting = false;
    let smashActive = false, smashTimer = 0;

    // ボールの状態に「高さ(bounce)」を追加
    const ball = { 
        x: w/2, y: h/2, radius: 7, speed: 6, dx: 0, dy: 0, 
        z: 0, vz: 0, isSmash: false 
    };
    const player = { x: w/2-40, y: h-25, width: 80, height: 10, color: "#c0392b", score: 0 };
    const cpu = { x: w/2-40, y: 15, width: 80, height: 10, color: "#2c3e50", score: 0 };

    function handleInput(e) {
        if (!isRunning) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) * (w / rect.width) - player.width / 2;
        if (e.type === "touchstart" || e.type === "mousedown") {
            smashActive = true; smashTimer = 15;
        }
    }

    window.addEventListener("mousemove", handleInput);
    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", handleInput, { passive: false });
    window.addEventListener("touchmove", handleInput, { passive: false });

    function startGame() {
        player.score = 0; cpu.score = 0;
        updateScores();
        overlay.style.display = "none";
        isRunning = true;
        prepareNextPoint("READY?");
        animate(); // アニメーションループ開始
    }

    function prepareNextPoint(msg) {
        isWaiting = true;
        ball.x = w / 2; ball.y = h / 2;
        ball.dx = 0; ball.dy = 0; ball.z = 0;
        messageDisplay.innerText = msg;
        messageDisplay.style.display = "block";

        setTimeout(() => {
            messageDisplay.style.display = "none";
            isWaiting = false;
            // 2秒後に動き出す
            ball.dx = (Math.random() - 0.5) * 6;
            ball.dy = 5;
        }, 2000);
    }

    function update() {
        if (!isRunning || isWaiting) return;

        if (smashTimer > 0) smashTimer--; else smashActive = false;

        ball.x += ball.dx;
        ball.y += ball.dy;

        // --- バウンドの物理シミュレーション ---
        ball.z += ball.vz;
        ball.vz -= 0.2; // 重力
        if (ball.z < 0) { // 台にバウンド
            ball.z = 0;
            ball.vz = 4; // 跳ね返り
        }

        if (ball.x < 0 || ball.x > w) ball.dx *= -1;
        cpu.x += (ball.x - (cpu.x + cpu.width/2)) * 0.1;

        let paddle = (ball.y > h/2) ? player : cpu;
        if (detectCollision(ball, paddle)) {
            let collidePoint = (ball.x - (paddle.x + paddle.width/2)) / (paddle.width/2);
            let angle = collidePoint * (Math.PI/3);
            let direction = (ball.y > h/2) ? -1 : 1;

            ball.speed = (paddle === player && smashActive) ? 14 : 7 + (player.score + cpu.score) * 0.2;
            ball.isSmash = (paddle === player && smashActive);
            
            ball.dy = direction * ball.speed * Math.cos(angle);
            ball.dx = ball.speed * Math.sin(angle);
            ball.vz = 6; // 打ち返した時に高く跳ねる
        }

        if (ball.y < 0 || ball.y > h) {
            if (ball.y < 0) player.score++; else cpu.score++;
            updateScores();
            if (player.score >= 11 || cpu.score >= 11) { endGame(); return; }
            prepareNextPoint(ball.y < 0 ? "POINT!" : "CPU POINT");
        }
    }

    function animate() {
        update();
        draw();
        if (isRunning) requestAnimationFrame(animate);
    }

    function updateScores() {
        document.getElementById("player-score").innerText = player.score;
        document.getElementById("cpu-score").innerText = cpu.score;
    }

    function endGame() {
        isRunning = false;
        overlay.style.display = "block";
        document.getElementById("status-title").innerText = (player.score >= 11) ? "YOU WIN!" : "LOSE...";
    }

    function detectCollision(b, p) {
        return b.x > p.x && b.x < p.x + p.width && b.y > p.y - 10 && b.y < p.y + p.height + 10 && b.z < 20;
    }

    function draw() {
        ctx.fillStyle = "#1e5799"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(w/2 - 2, 0, 4, h);
        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fillRect(0, h/2 - 2, w, 4);

        // 影の描画（ボールの高さに合わせて位置をずらす）
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.arc(ball.x + ball.z*0.5, ball.y + ball.z*0.5, ball.radius, 0, Math.PI*2);
        ctx.fill();

        // ボールの描画（高さに合わせて少し大きくする）
        let currentRadius = ball.radius + (ball.z * 0.2);
        ctx.fillStyle = ball.isSmash ? "#f1c40f" : "#ffffff";
        ctx.beginPath();
        ctx.arc(ball.x, ball.y - ball.z, currentRadius, 0, Math.PI*2);
        ctx.fill();

        drawPaddle(player.x, player.y, player.width, player.height, player.color, true);
        drawPaddle(cpu.x, cpu.y, cpu.width, cpu.height, cpu.color, false);
    }

    function drawPaddle(x, y, width, height, color, isPlayer) {
        ctx.fillStyle = color;
        if (isPlayer && smashActive) { ctx.shadowBlur = 15; ctx.shadowColor = "#fff"; }
        ctx.beginPath(); ctx.roundRect(x, y, width, height, 5); ctx.fill();
        ctx.shadowBlur = 0;
    }

    draw(); // 初回描画
</script>
</body>
</html>
