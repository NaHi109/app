<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nakata Hyper PingPong</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #1a2a3a; color: white;
            font-family: 'Helvetica Neue', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        .scoreboard {
            display: flex; gap: 20px; margin-bottom: 10px; background: #000;
            padding: 10px 30px; border-radius: 5px; border: 2px solid #f1c40f;
        }
        .score-num { font-size: 32px; font-weight: bold; color: #f1c40f; font-family: monospace; }
        #game-area { position: relative; perspective: 1000px; }
        canvas {
            background-color: #1e5799; display: block;
            border: 6px solid #fff; transform: rotateX(20deg);
        }
        #message-display {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 35px; font-weight: bold; color: #fff; text-align: center;
            text-shadow: 0 0 15px rgba(0,0,0,1); pointer-events: none; z-index: 20;
        }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0, 0, 0, 0.9); padding: 40px;
            border-radius: 10px; width: 85%; z-index: 30; border: 2px solid #f1c40f;
        }
        button {
            background: #f1c40f; border: none; color: #000; padding: 15px 30px;
            font-size: 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="scoreboard">
    <div style="text-align:center"><div style="font-size:10px">CPU</div><div id="cpu-score" class="score-num">0</div></div>
    <div style="font-size: 32px; margin-top:10px">:</div>
    <div style="text-align:center"><div style="font-size:10px">YOU</div><div id="player-score" class="score-num">0</div></div>
</div>

<div id="game-area">
    <canvas id="pongCanvas"></canvas>
    <div id="message-display"></div>
    <div id="overlay">
        <h2 style="margin-top:0; color:#f1c40f;">HYPER RALLY</h2>
        <p>タップでサーブ！高速ラリーを楽しもう！</p>
        <button onclick="startGame()">試合開始</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const messageDisplay = document.getElementById("message-display");

    const w = 400, h = 600;
    canvas.width = w; canvas.height = h;

    let isRunning = false, isWaiting = false, isServeMode = true;
    let smashActive = false, smashTimer = 0;
    let totalPoints = 0, server = "player";

    const ball = { 
        x: w/2, y: h/2, radius: 8, dx: 0, dy: 0, 
        z: 0, vz: 0, spin: 0, isSmash: false 
    };
    const player = { x: w/2, y: h-40, r: 35, color: "#e74c3c", score: 0, vx: 0 };
    const cpu = { x: w/2, y: 40, r: 35, color: "#34495e", score: 0 };

    function handleInput(e) {
        if (!isRunning) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = canvas.getBoundingClientRect();
        
        let nextX = (clientX - rect.left) * (w / rect.width);
        player.vx = nextX - player.x; 
        player.x = nextX;

        if (player.x < 40) player.x = 40;
        if (player.x > w - 40) player.x = w - 40;

        if (e.type === "touchstart" || e.type === "mousedown") {
            if (isServeMode && server === "player" && isWaiting) launchServe();
            else { smashActive = true; smashTimer = 15; }
        }
    }

    window.addEventListener("mousemove", handleInput);
    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", handleInput, { passive: false });
    window.addEventListener("touchmove", handleInput, { passive: false });

    function startGame() {
        player.score = 0; cpu.score = 0; totalPoints = 0; server = "player";
        updateScores(); overlay.style.display = "none"; isRunning = true;
        prepareNextPoint(); animate(); 
    }

    function prepareNextPoint() {
        isWaiting = true; isServeMode = true;
        ball.z = 20; ball.vz = 0; ball.dx = 0; ball.dy = 0; ball.spin = 0;
        server = (Math.floor(totalPoints / 2) % 2 === 0) ? "player" : "cpu";
        messageDisplay.innerHTML = server === "player" ? "YOUR SERVE" : "CPU SERVE";
        messageDisplay.style.display = "block";
        if (server === "cpu") setTimeout(() => { if(isRunning) launchServe(); }, 1200);
    }

    function launchServe() {
        messageDisplay.style.display = "none";
        isWaiting = false;
        if (server === "player") {
            ball.dy = -14; // サーブ威力強化
            ball.dx = player.vx * 0.6;
            ball.vz = 5;
            ball.spin = player.vx * 1.5;
        } else {
            ball.dy = 14;
            ball.dx = (Math.random()-0.5)*10;
            ball.vz = 5;
            ball.spin = (Math.random()-0.5)*12;
        }
    }

    function update() {
        if (!isRunning) return;

        if (isWaiting && isServeMode) {
            ball.x = (server === "player") ? player.x : cpu.x;
            ball.y = (server === "player") ? player.y - 20 : cpu.y + 20;
            ball.z = 25; // サーブ時にボールを見えやすく
            return; 
        }

        if (smashTimer > 0) smashTimer--; else smashActive = false;

        ball.x += ball.dx;
        ball.y += ball.dy;
        ball.z += ball.vz;
        ball.vz -= 0.35; // 重力強化

        if (ball.z < 0) {
            ball.z = 0; ball.vz = 6; 
            ball.dx += ball.spin * 0.4;
            ball.spin *= 0.8;
        }

        // サイドアウト判定を少し甘くしてラリーを続けやすく
        if (ball.x < -80 || ball.x > w + 80) pointScore(ball.x < 0 ? "cpu" : "player");

        // CPUの反応を強化
        cpu.x += (ball.x - cpu.x) * 0.18;

        // プレイヤー当たり判定（円形）
        let distP = Math.hypot(ball.x - player.x, ball.y - player.y);
        if (distP < player.r + ball.radius && ball.dy > 0 && ball.z < 40) {
            isServeMode = false;
            let speed = (smashActive) ? 22 : 14; // 全体的に威力強化
            let angle = (ball.x - player.x) / player.r;
            ball.dy = -speed;
            ball.dx = angle * 10 + player.vx * 0.5;
            ball.vz = 7;
            ball.spin = player.vx * 1.5;
            ball.isSmash = smashActive;
        }

        // CPU当たり判定
        let distC = Math.hypot(ball.x - cpu.x, ball.y - cpu.y);
        if (distC < cpu.r + ball.radius && ball.dy < 0 && ball.z < 40) {
            isServeMode = false;
            let speed = 14 + (player.score + cpu.score) * 0.2;
            let angle = (ball.x - cpu.x) / cpu.r;
            ball.dy = speed;
            ball.dx = angle * 10;
            ball.vz = 7;
            ball.isSmash = false;
        }

        if (ball.y < -50 || ball.y > h + 50) pointScore(ball.y < 0 ? "player" : "cpu");
    }

    function pointScore(winner) {
        if (winner === "player") player.score++; else cpu.score++;
        totalPoints++; updateScores();
        if (player.score >= 11 || cpu.score >= 11) { endGame(); return; }
        prepareNextPoint();
    }

    function animate() { update(); draw(); if (isRunning) requestAnimationFrame(animate); }
    function updateScores() {
        document.getElementById("player-score").innerText = player.score;
        document.getElementById("cpu-score").innerText = cpu.score;
    }
    function endGame() { isRunning = false; overlay.style.display = "block"; }

    function draw() {
        ctx.fillStyle = "#1e5799"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "white"; 
        ctx.fillRect(0, h/2 - 1, w, 2); // ネット
        ctx.fillRect(w/2 - 1, 0, 2, h); // センター

        // 影
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.arc(ball.x, ball.y + 10, ball.radius, 0, Math.PI*2); ctx.fill();

        // ボール（サイズ固定）
        ctx.fillStyle = ball.isSmash ? "#f1c40f" : "#ffffff";
        ctx.beginPath(); ctx.arc(ball.x, ball.y - ball.z, ball.radius, 0, Math.PI*2); ctx.fill();

        // ラケットの描画
        drawRacket(player.x, player.y, player.color, true);
        drawRacket(cpu.x, cpu.y, cpu.color, false);
    }

    function drawRacket(x, y, color, isPlayer) {
        ctx.save();
        if (isPlayer && smashActive) { ctx.shadowBlur = 20; ctx.shadowColor = "#fff"; }
        
        // ラバー部分
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.fill();
        
        // 木の持ち手
        ctx.fillStyle = "#d2b48c";
        if (isPlayer) {
            ctx.fillRect(x - 8, y + 30, 16, 25);
        } else {
            ctx.fillRect(x - 8, y - 55, 16, 25);
        }
        ctx.restore();
    }

    draw();
</script>
</body>
</html>
