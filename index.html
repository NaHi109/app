<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nakata Real Table Tennis</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        /* スコアボード風のデザイン */
        .scoreboard {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            background: #1a1a1a;
            padding: 10px 30px;
            border-radius: 5px;
            border: 2px solid #bdc3c7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .score-box {
            text-align: center;
        }
        .score-num {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #f1c40f;
        }
        .score-label { font-size: 12px; color: #bdc3c7; }

        /* 卓球台を斜めに配置して奥行きを出す */
        #game-area {
            position: relative;
            perspective: 800px;
        }
        canvas {
            background-color: #1e5799; /* 卓球台のブルー */
            display: block;
            border: 8px solid #fff; /* 台の縁 */
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            /* 3D的な傾きをつける */
            transform: rotateX(20deg);
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 10px;
            width: 80%;
            z-index: 10;
        }
        button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #ff5e4d; }
    </style>
</head>
<body>

<div class="scoreboard">
    <div class="score-box">
        <div class="score-label">CPU</div>
        <div id="cpu-score" class="score-num">0</div>
    </div>
    <div style="font-size: 32px; color: #fff;">-</div>
    <div class="score-box">
        <div class="score-label">YOU</div>
        <div id="player-score" class="score-num">0</div>
    </div>
</div>

<div id="game-area">
    <canvas id="pongCanvas"></canvas>
    
    <div id="overlay">
        <h2 id="status-title" style="margin-top:0;">REAL PING PONG</h2>
        <p id="status-msg">11点先取りで勝利！<br><br><b>【必殺技】</b><br>打つ瞬間のタップでスマッシュ！</p>
        <button onclick="startGame()">試合開始</button>
    </div>
</div>

    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");

    const cpu = { x: w/2 - 40, y: 15, width: 80, height: 10, color: "#2c3e50", score: 0 };

    function handleInput(e) {
        if (!isRunning) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) * (w / rect.width) - player.width / 2;
        
        if (e.type === "touchstart" || e.type === "mousedown") {
            smashActive = true;
            smashTimer = 12;
        }
    }

    window.addEventListener("mousemove", handleInput);
    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", handleInput, { passive: false });
